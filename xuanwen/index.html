/* ══════════════════════════════════════
   CSS VARIABLES & THEME
   ══════════════════════════════════════ */
:root {
  /* Brand: deep navy + electric teal accent */
  --bg: #F4F5F7;
  --card-bg: #FFFFFF;
  --surface: #F0F1F4;
  --surface-hover: #E8E9ED;
  --text-1: #0A1628;
  --text-2: #4A5568;
  --text-3: #8892A4;
  --accent: #29C6D6;
  --accent-hover: #22B6C7;
  --accent-light: #F0FBFD;
  --accent-glow: rgba(41,198,214,0.14);
  --action-bg: #FBFDFE;
  --action-hover: #F2FAFC;
  --action-border: #9EDDE7;
  --action-text: #183D49;
  --action-text-subtle: #52707A;
  --escape-bg: #F4F6F8;
  --escape-hover: #EDF1F4;
  --escape-border: #D5DEE6;
  --whatsapp: #25D366;
  --whatsapp-dark: #1DA851;
  --wechat: #07C160;
  --border: #E2E4E9;
  --border-light: #EEF0F4;
  --shadow-sm: 0 1px 3px rgba(10,22,40,0.06);
  --shadow-md: 0 4px 16px rgba(10,22,40,0.08);
  --shadow-lg: 0 12px 40px rgba(10,22,40,0.12);
  --radius: 16px;
  --radius-sm: 6px;
  --radius-xs: 6px;
  --header-gradient: linear-gradient(135deg, #0A1628 0%, #1A2A4A 50%, #0E3558 100%);
  --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

/* Dark mode removed — always light theme for cross-platform consistency */

/* ══════════════════════════════════════
   RESET & BASE
   ══════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 20px 16px 40px;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

a { color: inherit; text-decoration: none; }

/* ══════════════════════════════════════
   CARD CONTAINER
   ══════════════════════════════════════ */
.card {
  width: 100%;
  max-width: 420px;
  background: var(--card-bg);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ══════════════════════════════════════
   HEADER
   ══════════════════════════════════════ */
.header {
  background: var(--header-gradient);
  padding: 32px 28px 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

/* Subtle geometric pattern overlay */
.header::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 80%, rgba(8,145,178,0.15) 0%, transparent 50%),
    radial-gradient(circle at 85% 20%, rgba(8,145,178,0.08) 0%, transparent 40%);
  pointer-events: none;
}

.header-content { position: relative; z-index: 1; }

.avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(8px);
  border: 2px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  font-size: 24px;
  font-weight: 600;
  color: #fff;
  letter-spacing: 1px;
}

.name {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.title-line {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  font-weight: 400;
  line-height: 1.4;
}

.company {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  margin-top: 2px;
  letter-spacing: 0.3px;
}

.info-btn {
  position: absolute;
  bottom: 10px;
  right: 12px;
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: rgba(255,255,255,0.35);
  transition: all 0.2s;
  z-index: 2;
}

.info-btn:hover {
  background: rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.6);
}

.share-header-btn {
  position: absolute;
  bottom: 10px;
  right: 48px;
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: rgba(255,255,255,0.35);
  transition: all 0.2s;
  z-index: 2;
}

.share-header-btn:hover {
  background: rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.6);
}

/* ══════════════════════════════════════
   ACTION BUTTONS — 3×2 grid
   ══════════════════════════════════════ */
.actions-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  padding: 20px 20px 10px;
}

.action-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 16px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
  -webkit-appearance: none;
}

.action-btn:hover, .action-btn:active {
  background: var(--surface-hover);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.action-btn .icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.action-btn .icon svg { width: 20px; height: 20px; }

.action-btn .label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
}

.icon-call { background: rgba(8,145,178,0.12); color: var(--accent); }
.icon-email { background: rgba(239,68,68,0.1); color: #EF4444; }
.icon-web { background: rgba(99,102,241,0.1); color: #6366F1; }
/* Save Contact full-width button */
.save-contact-wrap { padding: 0 20px 16px; }

.save-btn {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--action-border);
  background: var(--action-bg);
  color: var(--action-text);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s ease;
}

.save-btn:hover { background: var(--action-hover); border-color: #7FD4E0; box-shadow: var(--shadow-sm); }
.save-btn svg { width: 18px; height: 18px; }

/* ══════════════════════════════════════
   DIVIDER
   ══════════════════════════════════════ */
.divider {
  height: 1px;
  background: var(--border-light);
  margin: 0 20px;
}

/* ══════════════════════════════════════
   CONTACT DETAILS — 2-column grid
   ══════════════════════════════════════ */
.details-section { padding: 20px 20px 8px; }

.section-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-3);
  font-weight: 600;
  margin-bottom: 12px;
}

.detail-item {
  padding: 10px 12px;
  border-radius: var(--radius-xs);
  transition: background 0.15s;
  position: relative;
}

.detail-item:hover { background: var(--surface); }

.detail-item.full-width { grid-column: 1 / -1; }

.detail-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.copy-icon {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: 1px solid var(--border-light);
  background: var(--card-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-3);
  transition: all 0.15s;
  margin-top: 2px;
}

.copy-icon:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.copy-icon svg { width: 13px; height: 13px; }

.detail-value a {
  color: var(--accent);
  text-decoration: none;
}

.detail-value a:hover { text-decoration: underline; }

.detail-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-3);
  font-weight: 500;
  margin-bottom: 3px;
}

.detail-value {
  font-size: 13px;
  color: var(--text-1);
  overflow-wrap: break-word;
  word-break: normal;
}

.detail-value a {
  color: var(--accent);
  text-decoration: none;
}

/* Map buttons */
.map-btns {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.map-btn {
  font-size: 11px;
  font-weight: 500;
  font-family: inherit;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
}

.map-btn:hover { background: var(--surface-hover); border-color: var(--accent); color: var(--accent); }

/* ══════════════════════════════════════
   QR SECTION — Tabbed (saves scroll)
   ══════════════════════════════════════ */
.qr-section { padding: 16px 20px 20px; }

.qr-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border-radius: 8px;
  padding: 3px;
  margin-bottom: 16px;
}

.qr-tab {
  flex: 1;
  padding: 9px 6px;
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  color: var(--text-3);
  background: transparent;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.qr-tab:hover { color: var(--text-2); }

.qr-tab.active {
  background: var(--card-bg);
  color: var(--text-1);
  box-shadow: var(--shadow-sm);
  font-weight: 600;
}

.qr-panel {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 24px 16px;
  text-align: center;
  min-height: 240px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.qr-panel canvas {
  border-radius: 6px;
  max-width: min(220px, 60vw);
  max-height: min(220px, 60vw);
}

.qr-panel img {
  border-radius: 6px;
  max-width: min(220px, 60vw);
  max-height: min(220px, 60vw);
  width: auto;
  height: auto;
}

.qr-hint {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 12px;
  line-height: 1.5;
  width: min(100%, 360px);
  text-align: left;
}

.qr-hint-table {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 4px 8px;
  align-items: start;
}

.qr-hint-label {
  white-space: nowrap;
}

.qr-hint-text {
  min-width: 0;
}

@media (max-width: 420px) {
  .qr-hint-table {
    grid-template-columns: 1fr;
    gap: 3px 0;
  }
  .qr-hint-label {
    white-space: normal;
  }
}

.qr-action-row {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  flex-wrap: wrap;
  justify-content: center;
}

.qr-action-btn {
  font-size: 12px;
  font-weight: 500;
  font-family: inherit;
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
}

.qr-action-btn:hover { border-color: var(--accent); color: var(--accent); }

.qr-action-btn.primary {
  background: var(--action-bg);
  border-color: var(--action-border);
  color: var(--action-text);
}

.qr-action-btn.primary:hover { background: var(--action-hover); border-color:#7FD4E0; color:var(--action-text); }

.qr-action-btn.wa-green { background: var(--whatsapp); border-color: var(--whatsapp); color: #fff; text-shadow: 0 1px 0 rgba(0,0,0,0.08); }
.qr-action-btn.wa-green:hover { background: var(--whatsapp-dark); }

.qr-action-btn.wc-green { background: var(--wechat); border-color: var(--wechat); color: #fff; text-shadow: 0 1px 0 rgba(0,0,0,0.08); }
.qr-action-btn.wc-green:hover { background: #06A050; }

/* ══════════════════════════════════════
   SHARE BUTTON
   ══════════════════════════════════════ */
.share-wrap { padding: 0 20px 20px; }

.share-btn {
  width: 100%;
  padding: 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text-2);
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.15s;
}

.share-btn:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }
.share-btn svg { width: 16px; height: 16px; }

/* ══════════════════════════════════════
   FOOTER
   ══════════════════════════════════════ */
.footer {
  text-align: center;
  padding: 16px;
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.4px;
}

.footer .ver {
  display: inline-block;
  background: var(--surface);
  padding: 2px 8px;
  border-radius: 4px;
  margin-left: 4px;
  font-weight: 600;
}

/* ══════════════════════════════════════
   MODAL
   ══════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,22,40,0.6);
  backdrop-filter: blur(4px);
  z-index: 999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}

.modal-overlay.show { display: flex; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 360px;
  overflow: hidden;
  animation: modalPop 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes modalPop {
  from { opacity: 0; transform: scale(0.92) translateY(10px); }

.modal-body {

}

.modal-text {

}

.modal-actions {

  flex-direction: column;
  gap: 8px;
}

.modal-btn {
  width: 100%;
  padding: 12px 16px;
  font-size: 14px;
  font-weight: 500;

.modal-btn-primary { background: var(--action-bg); color: var(--action-text); border: 1px solid var(--action-border); box-shadow: 0 1px 2px rgba(10,22,40,0.03); }
.modal-btn-primary:hover { background: var(--action-hover); border-color:#7FD1DE; color:var(--action-text); }

.modal-btn-secondary { background: var(--escape-bg); color: #6A7787; border:1px solid var(--escape-border); }
.modal-btn-secondary:hover { background: var(--escape-hover); border-color:#C8D3DC; color:#526273; }

.modal-btn-ghost { background: var(--escape-bg); color: #566577; border: 1px solid var(--escape-border); font-size: 14px; font-weight: 600; }
.modal-btn-ghost:hover { background: var(--escape-hover); color: #4D5D6F; border-color:#C8D3DC; }

.done-btn {
  width: 100%;
  margin-top: 16px;
  padding: 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--escape-border);
  background: var(--escape-bg);
  color: var(--text-2);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
}

.done-btn:hover { background: var(--escape-hover); color: #4D5D6F; border-color:#C8D3DC; }

/* Unified actionable button polish */
:where(.action-btn,.save-btn,.simple-save-btn,.simple-meet-btn,.modal-btn,.done-btn,.share-btn,.qr-action-btn,.map-btn,.collapse-bar){
  border-radius: var(--radius-sm) !important;
}
:where(.action-btn,.save-btn,.simple-save-btn,.simple-meet-btn,.modal-btn,.share-btn,.qr-action-btn,.map-btn,.copy-icon,.collapse-bar,.done-btn){
  transition: background-color .16s ease, border-color .16s ease, color .16s ease, box-shadow .16s ease, transform .16s ease, filter .16s ease;
}
@media (hover:hover) and (pointer:fine) {
  :where(.action-btn,.save-btn,.simple-save-btn,.simple-meet-btn,.modal-btn-primary,.share-btn,.qr-action-btn,.map-btn,.copy-icon,.collapse-bar,.done-btn):hover{
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(10,22,40,0.05);
    border-color: #7FD1DE;
    filter: saturate(1.01);
  }
  :where(.modal-btn-ghost,.modal-btn-secondary):hover{
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(10,22,40,0.04);
    border-color: #CBD6DF;
  }
}
:where(.action-btn,.save-btn,.simple-save-btn,.simple-meet-btn,.modal-btn,.share-btn,.qr-action-btn,.map-btn,.copy-icon,.collapse-bar,.done-btn):active{
  transform: translateY(0);
  box-shadow: none;
}
.btn-icon-chip{
  width: 32px;
  height: 32px;
  min-width: 32px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  background: linear-gradient(180deg,#FFFFFF 0%,#F7FAFC 100%);

/* WhatsApp input */
.wa-input-group {
  display: flex;

}

.wa-input {
  flex: 1;
  padding: 10px 14px;

}

.wa-input:focus { border-color: var(--accent); }

/* ══════════════════════════════════════

   ══════════════════════════════════════ */
.wa-fallback-banner {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.wa-fallback-banner button {

.wa-fallback-banner button:hover { background: rgba(255,255,255,0.25); }

/* ══════════════════════════════════════
   TOAST
   ══════════════════════════════════════ */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;

/* ═══════════════════════════════════════════════════════════════════
   DUAL MODE SYSTEM  v18.2
   .adv  = hidden in simple/public mode, revealed in advanced mode
   .sim  = shown in simple mode, hidden in advanced mode
   ═══════════════════════════════════════════════════════════════════ */

/* ── Hide advanced sections in simple mode ── */
.adv { display: none !important; }

/* ── Reveal advanced sections when mode-adv is set on .card ── */
.card.mode-adv .adv.actions-grid      { display: grid !important; }
.card.mode-adv .adv.save-contact-wrap { display: flex !important; }
.card.mode-adv .adv.info-btn          { display: flex !important; }
.card.mode-adv .adv.share-header-btn  { display: flex !important; }

/* ── Slide-in animation when advanced sections appear ── */
.card.mode-adv .adv {
  animation: advReveal 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
}
@keyframes advReveal {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0);    }
}

/* ── Simple-mode-only elements ── */
.sim { display: block; }
.card.mode-adv .sim { display: none !important; }

/* ── Simple mode: 4-icon action row ── */
.simple-actions {
  display: flex;
  justify-content: space-around;
  align-items: flex-start;
  padding: 28px 12px 12px;
}
.simple-action {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
  flex: 1;
  padding: 0;
}
.simple-action-icon {
  width: 54px;
  height: 54px;
  border-radius: 17px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease;
}
.simple-action:active .simple-action-icon { transform: scale(0.86); }
.simple-action-icon svg { width: 22px; height: 22px; flex-shrink: 0; }
.simple-action-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-2);
  letter-spacing: 0.1px;
  white-space: nowrap;
}
.sa-call  { background: rgba(8,145,178,0.12);  color: var(--accent); }
.sa-chat  { background: rgba(37,211,102,0.12); color: #25D366; }
.sa-email { background: rgba(239,68,68,0.10);  color: #EF4444; }
.sa-web   { background: rgba(99,102,241,0.10); color: #6366F1; }

/* ── Simple mode: public CTAs ── */
.simple-save-wrap { padding: 2px 20px 28px; }
.simple-cta-stack {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.simple-cta-stack.contact-saved .simple-meet-btn {
  grid-column: 1 / -1;
}
.simple-cta-stack.contact-saved .simple-save-btn {
  display: none;
}
.simple-save-btn,
.simple-meet-btn {
  width: 100%;
  padding: 15px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
  -webkit-appearance: none;
}
.simple-save-btn {
  border: 1px solid var(--action-border);
  background: var(--action-bg);
  color: var(--action-text);
}
.simple-save-btn:hover,
.simple-save-btn:active { background: var(--action-hover); border-color:#7FD4E0; }
.simple-meet-btn {
  border: 1px solid var(--action-border);
  background: var(--action-bg);
  color: var(--action-text);
}
.simple-meet-btn:hover,
.simple-meet-btn:active {
  background: var(--action-hover);
  color: var(--action-text);
  border-color:#7FD4E0;
}
.simple-save-btn svg,
.simple-meet-btn svg { width: 18px; height: 18px; }

/* ── Collapse bar (advanced mode exit — sits at card bottom) ── */
.collapse-bar-wrap {
  display: none;
  padding: 6px 20px 18px;
  justify-content: center;
}
.card.mode-adv .collapse-bar-wrap { display: flex; }
.collapse-bar {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 22px;
  border-radius: 8px;
  border: 1.5px solid var(--border-light);
  background: var(--surface);
  color: var(--text-3);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.collapse-bar:hover  { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.collapse-bar:active { transform: scale(0.96); }
.collapse-bar svg { width: 13px; height: 13px; }

/* ── Footer mode badge ── */
.ver.mode-toggle {
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.2s, color 0.2s;
  background: var(--accent-light) !important;
  color: var(--accent) !important;
}
.card.mode-adv ~ .footer .ver.mode-toggle {
  background: var(--surface) !important;
  color: var(--text-3) !important;
}

/* ── Avatar: subtle teal ring in advanced mode (owner indicator) ── */
#avatarToggle {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 44px;
  height: 44px;
  margin: 0;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: none;
  opacity: 0;
  color: transparent !important;
  background: transparent !important;
  border: 0 !important;
  box-shadow: none !important;
  text-shadow: none !important;
}
.card.mode-adv #avatarToggle {
  opacity: 0;
  box-shadow: none !important;
}

/* ── Hide Telegram icon in public chat-row ── */
.pub-hide-tg { display: inline-flex; }
.card:not(.mode-adv) .pub-hide-tg { display: none !important; }

/* ── Hide Telegram & vCard QR tabs/panels in public mode ── */
.card:not(.mode-adv) .qr-tab[data-tab="telegram"],
.card:not(.mode-adv) .qr-tab[data-tab="vcard"],
.card:not(.mode-adv) #panel-telegram,
.card:not(.mode-adv) #panel-vcard { display: none !important; }

@media (max-width: 380px) {
  .simple-actions   { padding: 22px 4px 10px; }
  .simple-action-icon { width: 48px; height: 48px; border-radius: 14px; }
  .simple-save-wrap { padding: 0 16px 22px; }
  .simple-cta-stack { gap: 10px; }
}


/* ══════════════════════════════════════
   v18.3.2 v27 OUTPUT PREMIUM SKIN
   Narrow output-template enhancement:
   - Synap-tone browser presentation
   - premium dark stage / glass card
   - refined public and advanced controls
   - no change to frozen v18.3.0 data structure
   ══════════════════════════════════════ */
:root {
  --synap-cyan: #00C8D7;
  --synap-blue: #0086FF;
  --synap-navy: #0A1628;
  --synap-deep: #06111F;
  --synap-steel: #6F7C8A;
  --bg: #07111F;
  --card-bg: rgba(255,255,255,0.985);
  --surface: #F3F7FA;
  --surface-hover: #EAF3F8;
  --accent: var(--synap-cyan);
  --accent-hover: var(--synap-blue);
  --accent-light: #EAFBFE;
  --accent-glow: rgba(0,200,215,0.20);
  --action-bg: linear-gradient(180deg,#FFFFFF 0%,#F1FBFE 100%);
  --action-hover: linear-gradient(180deg,#FFFFFF 0%,#E7F8FD 100%);
  --action-border: rgba(0,200,215,0.44);
  --action-text: #123A4A;
  --header-gradient:
    radial-gradient(circle at 18% 16%, rgba(0,200,215,0.32) 0%, rgba(0,200,215,0.00) 30%),
    radial-gradient(circle at 84% 14%, rgba(0,134,255,0.30) 0%, rgba(0,134,255,0.00) 34%),
    linear-gradient(135deg, #07111F 0%, #0A1628 44%, #123A5D 100%);
  --radius: 24px;
  --radius-sm: 14px;
  --radius-xs: 11px;
}

html {
  background: #07111F;
}

body {
  background:
    radial-gradient(circle at 10% 6%, rgba(0,200,215,0.18) 0%, rgba(0,200,215,0.00) 27vw),
    radial-gradient(circle at 92% 8%, rgba(0,134,255,0.17) 0%, rgba(0,134,255,0.00) 28vw),
    linear-gradient(145deg, #040A12 0%, #07111F 42%, #0A1628 100%);
  padding: clamp(20px, 4vw, 46px) 16px 48px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(90deg, rgba(255,255,255,0.028) 1px, transparent 1px),
    linear-gradient(180deg, rgba(255,255,255,0.024) 1px, transparent 1px);
  background-size: 42px 42px;
  mask-image: radial-gradient(circle at 50% 18%, rgba(0,0,0,0.62) 0%, rgba(0,0,0,0.22) 48%, transparent 76%);
  opacity: 0.55;
}

body::after {
  content: "";
  position: fixed;
  width: min(72vw, 740px);
  height: min(72vw, 740px);
  right: -28vw;
  bottom: -42vw;
  border: 1px solid rgba(0,200,215,0.18);
  border-radius: 50%;
  box-shadow:
    0 0 0 26px rgba(0,200,215,0.025),
    0 0 0 62px rgba(0,134,255,0.020),
    0 0 54px rgba(0,200,215,0.12);
  pointer-events: none;
}

.card {
  max-width: 452px;
  border-radius: 28px;
  border: 1px solid rgba(160,230,242,0.28);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.995) 0%, rgba(248,252,254,0.985) 100%);
  box-shadow:
    0 28px 90px rgba(0,0,0,0.34),
    0 12px 34px rgba(0,200,215,0.10),
    inset 0 1px 0 rgba(255,255,255,0.88);
  position: relative;
  isolation: isolate;
}

.card::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(135deg, rgba(0,200,215,0.72), rgba(0,134,255,0.18), rgba(255,255,255,0.14));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  z-index: 3;
}

.header {
  padding: 36px 28px 31px;
  background: var(--header-gradient);
  border-bottom: 1px solid rgba(0,200,215,0.24);

.header::before {
  background:

.header::after {

  border: 0;
  border-radius: 999px;

function normalizeOwnerImageAsset(asset) {
  const value = String(asset || '').trim();
  if (!value) return '';
  if (/^data:image\//i.test(value)) return value;
  if (/^(https?:)?\/\//i.test(value) || /^\.\.?\//.test(value) || /^\//.test(value)) return value;
  // B8 normally adopts a full data URL. This fallback supports raw base64 PNG/JPEG strings.
  const compact = value.replace(/\s+/g, '');
  if (compact.length > 180 && /^[A-Za-z0-9+/=]+$/.test(compact)) return 'data:image/png;base64,' + compact;
  return '';
}
function ownerCssUrl(value) {
  return 'url("' + String(value).replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '")';
}

function isAdvancedMode() {

// ──────────────────────────────────────
// DEVICE DETECTION
// ──────────────────────────────────────
const UA = navigator.userAgent || '';
const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(UA);
const isTablet = /iPad|Tablet/i.test(UA) || (/Android/i.test(UA) && !/Mobile/i.test(UA));
const hasCoarsePointer = !!(window.matchMedia && (window.matchMedia('(hover: none)').matches || window.matchMedia('(pointer: coarse)').matches));
const isTouchDevice = isMobile || isTablet || (navigator.maxTouchPoints || 0) > 0 || hasCoarsePointer;
const isIOS = /iPhone|iPad|iPod/i.test(UA);
const isAndroid = /Android/i.test(UA);

function getDeviceKind() {
  if (isTablet) return 'Tablet';
  if (isMobile) return 'Mobile';
  return 'Desktop';
}

// ──────────────────────────────────────
// CHINA / LOCALE DETECTION
// ──────────────────────────────────────
// Detect Chinese locale (OS language)
const userLang = (navigator.language || navigator.userLanguage || '').toLowerCase();
const userLangs = (navigator.languages || []).map(l => l.toLowerCase());
const isChineseLang = userLang.startsWith('zh') || userLangs.some(l => l.startsWith('zh'));

// Detect China timezone
const userTZ = (() => {
  try { return Intl.DateTimeFormat().resolvedOptions().timeZone; } catch(e) { return ''; }
})();
const isChinaTZ = /^Asia\/(Shanghai|Chongqing|Urumqi|Harbin)$/i.test(userTZ);

// Combined: likely a China-based or Chinese-speaking user
let isLikelyChinaUser = isChineseLang || isChinaTZ;

// Network probe: try to reach Google (blocked in China)
// Result is async — updates the modal if user hasn't acted yet
let isGoogleBlocked = false;
let chinaProbeComplete = false;

function probeGoogleAccess() {
  const img = new Image();
  let resolved = false;
  const timeout = setTimeout(() => {
    if (!resolved) {
      resolved = true;
      isGoogleBlocked = true;
      isLikelyChinaUser = true;
      chinaProbeComplete = true;
    }
  }, 3000); // 3s timeout — if Google favicon doesn't load, likely blocked

  img.onload = () => {
    if (!resolved) {
      resolved = true;
      clearTimeout(timeout);
      isGoogleBlocked = false;
      chinaProbeComplete = true;
    }
  };
  img.onerror = () => {
    if (!resolved) {
      resolved = true;
      clearTimeout(timeout);
      // Error could be CORS or blocking — treat as potentially blocked
      isGoogleBlocked = true;
      isLikelyChinaUser = true;
      chinaProbeComplete = true;
    }
  };
  img.src = 'https://www.google.com/favicon.ico?' + Date.now();
}

// Run probe on page load
probeGoogleAccess();

// ──────────────────────────────────────
// CHAT SERVICE REACHABILITY PROBES
// ──────────────────────────────────────
// Probe WhatsApp (wa.me), WeChat (weixin.qq.com), Telegram (t.me)
// Uses favicon/image probe with timeout — same technique as Google probe

let chatReachable = { whatsapp: true, wechat: true, telegram: true }; // default to reachable, probes can downgrade
let calendarReachable = { outlook: true, feishu: true }; // default to reachable, probes can downgrade
let calendarProbeComplete = { outlook: false, feishu: false };

function probeService(name, url, callback) {
  const img = new Image();
  let resolved = false;
  const timeout = setTimeout(() => {
    // Timeout = no response at all = likely blocked by firewall
    if (!resolved) { resolved = true; callback(false); }
  }, 4000);

  img.onload = () => {
    if (!resolved) { resolved = true; clearTimeout(timeout); callback(true); }
  };
  img.onerror = () => {
    if (!resolved) {
      resolved = true;
      clearTimeout(timeout);
      // onerror fires for CORS blocks, 404s, etc — service is still reachable
      // Only a true timeout (no response) indicates network-level blocking
      callback(true);
    }
  };
  img.src = url + '?' + Date.now();
}

// ──────────────────────────────────────
// QR CODE ENCODER — proven, compact, supports byte mode
// Based on nayuki.io/page/qr-code-generator-library (public domain concepts)
// Re-implemented for minimal footprint, byte mode, ECC levels L/M
// ──────────────────────────────────────
const QRCode = (() => {
  // GF(256) arithmetic with AES irreducible polynomial
  const EXP = new Uint8Array(256), LOG = new Uint8Array(256);
  {
    let v = 1;
    for (let i = 0; i < 255; i++) {
      EXP[i] = v;
      LOG[v] = i;
      v = (v << 1) ^ (v >= 128 ? 0x11D : 0);
    }
    EXP[255] = EXP[0];
  }

  function gfMul(a, b) {
    return a === 0 || b === 0 ? 0 : EXP[(LOG[a] + LOG[b]) % 255];
  }

  function polyMul(a, b) {
    const r = new Uint8Array(a.length + b.length - 1);
    for (let i = 0; i < a.length; i++)
      for (let j = 0; j < b.length; j++)
        r[i + j] ^= gfMul(a[i], b[j]);
    return r;
  }

  function polyRem(dividend, divisor) {
    const r = new Uint8Array(dividend);
    for (let i = 0; i < dividend.length - divisor.length + 1; i++) {
      if (r[i] === 0) continue;
      for (let j = 1; j < divisor.length; j++)
        r[i + j] ^= gfMul(divisor[j], r[i]);
    }
    return r.slice(dividend.length - divisor.length + 1);
  }

  function genPoly(n) {
    let p = new Uint8Array([1]);
    for (let i = 0; i < n; i++)
      p = polyMul(p, new Uint8Array([1, EXP[i]]));
    return p;
  }

  // ECC block info tables
  // [total codewords, [numBlocks, dataPerBlock]...]
  // Only L and M levels implemented
  const ECC_TABLE = {
    L: [
      null,
      [26,[[1,19]]],[44,[[1,34]]],[70,[[1,55]]],[100,[[1,80]]],[134,[[1,108]]],
      [172,[[2,68]]],[196,[[2,78]]],[242,[[2,97]]],[292,[[2,116]]],[346,[[2,68],[2,69]]],

      [1706,[[10,114],[2,115]]],[1828,[[8,122],[4,123]]],[1921,[[3,117],[10,118]]],[2051,[[7,116],[7,117]]],[2185,[[5,115],[10,116]]],

    ],
    M: [

      [172,[[4,27]]],[196,[[4,31]]],[242,[[2,38],[2,39]]],[292,[[3,36],[2,37]]],[346,[[4,43],[1,44]]],

    ]
  };

  // Alignment pattern positions
  const ALIGN_POS = [
    null,[],
    [6,18],[6,22],[6,26],[6,30],[6,34],
    [6,22,38],[6,24,42],[6,26,46],[6,28,50],[6,30,54],
    [6,32,58],[6,34,62],[6,26,46,66],[6,26,48,70],[6,26,50,74],
    [6,30,54,78],[6,30,56,82],[6,30,58,86],[6,34,62,90],
    [6,28,50,72,94],[6,26,50,74,98],[6,30,54,78,102],[6,28,54,80,106],
    [6,32,58,84,110],[6,30,58,86,114],[6,34,62,90,118],
    [6,26,50,74,98,122],[6,30,54,78,102,126],[6,26,52,78,104,130],
    [6,30,56,82,108,134],[6,34,60,86,112,138],[6,30,58,86,114,142],
    [6,34,62,90,118,146],[6,30,54,78,102,126,150],[6,24,50,76,102,128,154],
    [6,28,54,80,106,132,158],[6,32,58,84,110,136,162],[6,26,54,82,110,138,166]
  ];

  // Format info strings (pre-computed with BCH)
  const FORMAT_INFO = {
    L: [0x77C4,0x72F3,0x7DAA,0x789D,0x662F,0x6318,0x6C41,0x6976,
        0x5412,0x5125,0x5E7C,0x5B4B,0x45F9,0x40CE,0x4F97,0x4AA0,
        0x355F,0x3068,0x3F31,0x3A06,0x24B4,0x2183,0x2EDA,0x2BED,
        0x1689,0x13BE,0x1CE7,0x19D0,0x0762,0x0255,0x0D0C,0x083B],
    M: [0x5B5A,0x5E6D,0x5134,0x5403,0x4AB1,0x4F86,0x40DF,0x45E8,
        0x788C,0x7DBB,0x72E2,0x77D5,0x6967,0x6C50,0x6309,0x663E,
        0x19C1,0x1CF6,0x13AF,0x1698,0x082A,0x0D1D,0x0244,0x0773,
        0x3A17,0x3F20,0x3079,0x354E,0x2BFC,0x2ECB,0x2192,0x24A5]
  };

  // Version info (pre-computed, v7+)
  const VERSION_INFO = [
    null,null,null,null,null,null,null,
    0x07C94,0x085BC,0x09A99,0x0A4D3,0x0BBF6,0x0C762,0x0D847,0x0E60D,0x0F928,
    0x10B78,0x1145D,0x12A17,0x13532,0x149A6,0x15683,0x168C9,0x177EC,
    0x18EC4,0x191E1,0x1AFAB,0x1B08E,0x1CC1A,0x1D33F,0x1ED75,0x1F250,
    0x209D5,0x216F0,0x228BA,0x2379F,0x24B0B,0x2542E,0x26A64,0x27541
  ];

  function generate(text, ecLevel = 'M') {
    const data = new TextEncoder().encode(text);
    const len = data.length;

    // Find minimum version
    const eccTable = ECC_TABLE[ecLevel];
    let version = 0;
    for (let v = 1; v <= 40; v++) {
      const entry = eccTable[v];
      let dataCap = 0;
      for (const [nb, dpb] of entry[1]) dataCap += nb * dpb;
      const headerBytes = 1 + (v <= 9 ? 1 : 2); // mode + count
      if (dataCap >= len + headerBytes) { version = v; break; }
    }
    if (!version) throw new Error('Data too large');

    const size = version * 4 + 17;
    const modules = Array.from({length: size}, () => new Int8Array(size)); // 0=white, 1=black, -1 = not set
    const isFunction = Array.from({length: size}, () => new Uint8Array(size));

    // ── Place function patterns ──
    function setModule(r, c, val) {
      modules[r][c] = val ? 1 : 0;
      isFunction[r][c] = 1;
    }

    // Finder patterns
    function placeFinderPattern(row, col) {
      for (let dr = -1; dr <= 7; dr++) {
        for (let dc = -1; dc <= 7; dc++) {
          const r = row + dr, c = col + dc;
          if (r < 0 || r >= size || c < 0 || c >= size) continue;
          const inOuter = dr === 0 || dr === 6 || dc === 0 || dc === 6;
          const inInner = dr >= 2 && dr <= 4 && dc >= 2 && dc <= 4;
          setModule(r, c, (inOuter || inInner) && dr >= 0 && dr <= 6 && dc >= 0 && dc <= 6 ? 1 : 0);
        }
      }
    }

    placeFinderPattern(0, 0);
    placeFinderPattern(0, size - 7);
    placeFinderPattern(size - 7, 0);

    // Alignment patterns
    const alignPos = ALIGN_POS[version];
    if (alignPos.length > 0) {
      for (const r of alignPos) {
        for (const c of alignPos) {
          if ((r <= 8 && c <= 8) || (r <= 8 && c >= size - 8) || (r >= size - 8 && c <= 8)) continue;
          for (let dr = -2; dr <= 2; dr++) {
            for (let dc = -2; dc <= 2; dc++) {
              setModule(r + dr, c + dc,
                Math.abs(dr) === 2 || Math.abs(dc) === 2 || (dr === 0 && dc === 0) ? 1 : 0);
            }
          }
        }
      }
    }

    // Timing patterns
    for (let i = 8; i < size - 8; i++) {
      if (!isFunction[6][i]) setModule(6, i, i % 2 === 0 ? 1 : 0);
      if (!isFunction[i][6]) setModule(i, 6, i % 2 === 0 ? 1 : 0);
    }

    // Dark module
    setModule(size - 8, 8, 1);

    // Reserve format areas
    for (let i = 0; i < 9; i++) {
      if (i < size) { isFunction[8][i] = 1; isFunction[i][8] = 1; }
    }
    for (let i = 0; i < 8; i++) {
      isFunction[8][size - 1 - i] = 1;
      isFunction[size - 1 - i][8] = 1;
    }

    // Reserve version areas
    if (version >= 7) {
      for (let i = 0; i < 6; i++) {
        for (let j = 0; j < 3; j++) {
          isFunction[i][size - 11 + j] = 1;
          isFunction[size - 11 + j][i] = 1;
        }
      }
    }

    // ── Encode data ──
    const entry = eccTable[version];
    const totalCodewords = entry[0];
    let totalDataCodewords = 0;
    for (const [nb, dpb] of entry[1]) totalDataCodewords += nb * dpb;
    const eccCodewordsPerBlock = (() => {
      const [nb0, dpb0] = entry[1][0];
      return (totalCodewords - totalDataCodewords) /
        entry[1].reduce((s, [n]) => s + n, 0);
    })();

    // Build data bitstream
    const bits = [];
    function pushBits(val, len) { for (let i = len - 1; i >= 0; i--) bits.push((val >> i) & 1); }

    // Byte mode indicator
    pushBits(0b0100, 4);
    // Count
    pushBits(len, version <= 9 ? 8 : 16);
    // Data bytes
    for (const b of data) pushBits(b, 8);
    // Terminator
    const capBits = totalDataCodewords * 8;
    for (let i = 0; i < 4 && bits.length < capBits; i++) bits.push(0);
    // Byte-align
    while (bits.length % 8 !== 0 && bits.length < capBits) bits.push(0);
    // Pad bytes
    const padBytes = [0xEC, 0x11];
    let pi = 0;
    while (bits.length < capBits) { pushBits(padBytes[pi % 2], 8); pi++; }

    // Convert to codeword array
    const dataCodewords = new Uint8Array(totalDataCodewords);
    for (let i = 0; i < totalDataCodewords; i++) {
      let byte = 0;
      for (let b = 0; b < 8; b++) byte = (byte << 1) | (bits[i * 8 + b] || 0);
      dataCodewords[i] = byte;
    }

    // Split into blocks and compute ECC
    const blocks = [];
    const eccBlocks = [];
    let offset = 0;
    const gp = genPoly(eccCodewordsPerBlock);

    for (const [numBlocks, dataPerBlock] of entry[1]) {
      for (let i = 0; i < numBlocks; i++) {
        const block = dataCodewords.slice(offset, offset + dataPerBlock);
        offset += dataPerBlock;
        blocks.push(block);

        // Compute ECC
        const padded = new Uint8Array(dataPerBlock + eccCodewordsPerBlock);
        padded.set(block);
        const ecc = polyRem(padded, gp);
        eccBlocks.push(ecc);
      }
    }

    // Interleave data blocks
    const interleaved = [];
    const maxDataLen = Math.max(...blocks.map(b => b.length));
    for (let i = 0; i < maxDataLen; i++)
      for (const block of blocks)
        if (i < block.length) interleaved.push(block[i]);
    for (let i = 0; i < eccCodewordsPerBlock; i++)
      for (const ecc of eccBlocks)
        if (i < ecc.length) interleaved.push(ecc[i]);

    // Convert to bits
    const allBits = [];
    for (const cw of interleaved)
      for (let b = 7; b >= 0; b--) allBits.push((cw >> b) & 1);

    // ── Place data bits in zigzag ──
    let bitIdx = 0;
    for (let right = size - 1; right >= 1; right -= 2) {
      if (right === 6) right = 5;
      for (let vert = 0; vert < size; vert++) {
        for (let j = 0; j < 2; j++) {
          const col = right - j;
          const row = ((Math.floor((size - 1 - right + (right < 6 ? 1 : 0)) / 2)) % 2 === 0)
            ? (size - 1 - vert) : vert;
          if (!isFunction[row][col]) {
            modules[row][col] = bitIdx < allBits.length ? allBits[bitIdx] : 0;
            bitIdx++;
          }
        }
      }
    }

    // ── Apply best mask ──
    let bestMask = 0, bestScore = Infinity;
    for (let mask = 0; mask < 8; mask++) {
      const masked = applyMask(modules, isFunction, size, mask);
      const score = evaluateMask(masked, size);
      if (score < bestScore) { bestScore = score; bestMask = mask; }
    }

    // Apply best mask permanently
    for (let r = 0; r < size; r++)
      for (let c = 0; c < size; c++)
        if (!isFunction[r][c])
          modules[r][c] ^= getMaskBit(bestMask, r, c) ? 1 : 0;

    // ── Write format info ──
    const formatIdx = bestMask;
    const formatVal = FORMAT_INFO[ecLevel][formatIdx];
    // Positions around top-left finder + separators
    const fmtPositions1 = [
      [8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],
      [7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]
    ];
    const fmtPositions2 = [
      [size-1,8],[size-2,8],[size-3,8],[size-4,8],[size-5,8],[size-6,8],[size-7,8],
      [8,size-8],[8,size-7],[8,size-6],[8,size-5],[8,size-4],[8,size-3],[8,size-2],[8,size-1]
    ];
    for (let i = 0; i < 15; i++) {
      const bit = (formatVal >> (14 - i)) & 1;
      const [r1, c1] = fmtPositions1[i];
      modules[r1][c1] = bit;
      const [r2, c2] = fmtPositions2[i];
      modules[r2][c2] = bit;
    }

    // ── Write version info (v7+) ──
    if (version >= 7) {
      const vi = VERSION_INFO[version];
      for (let i = 0; i < 18; i++) {
        const bit = (vi >> i) & 1;
        const r = Math.floor(i / 3), c = size - 11 + (i % 3);
        modules[r][c] = bit;
        modules[c][r] = bit;
      }
    }

    return modules;
  }

  function getMaskBit(mask, r, c) {
    switch(mask) {
      case 0: return (r + c) % 2 === 0;
      case 1: return r % 2 === 0;
      case 2: return c % 3 === 0;
      case 3: return (r + c) % 3 === 0;
      case 4: return (Math.floor(r/2) + Math.floor(c/3)) % 2 === 0;
      case 5: return (r*c)%2 + (r*c)%3 === 0;
      case 6: return ((r*c)%2 + (r*c)%3) % 2 === 0;
      case 7: return ((r+c)%2 + (r*c)%3) % 2 === 0;
    }
  }

  function applyMask(modules, isFunction, size, mask) {
    const result = modules.map(row => new Int8Array(row));
    for (let r = 0; r < size; r++)
      for (let c = 0; c < size; c++)
        if (!isFunction[r][c])
          result[r][c] ^= getMaskBit(mask, r, c) ? 1 : 0;
    return result;
  }

  function evaluateMask(modules, size) {
    let score = 0;
    // Rule 1: runs of same color
    for (let r = 0; r < size; r++) {
      let run = 1;
      for (let c = 1; c < size; c++) {
        if (modules[r][c] === modules[r][c-1]) {
          run++;
          if (run === 5) score += 3;
          else if (run > 5) score += 1;
        } else run = 1;
      }
    }
    for (let c = 0; c < size; c++) {
      let run = 1;
      for (let r = 1; r < size; r++) {
        if (modules[r][c] === modules[r-1][c]) {
          run++;
          if (run === 5) score += 3;
          else if (run > 5) score += 1;
        } else run = 1;
      }
    }
    // Rule 2: 2×2 blocks
    for (let r = 0; r < size - 1; r++)
      for (let c = 0; c < size - 1; c++) {
        const v = modules[r][c];
        if (v === modules[r][c+1] && v === modules[r+1][c] && v === modules[r+1][c+1])
          score += 3;
      }
    // Simplified — skip rules 3 & 4 for performance
    return score;
  }

  return { generate };
})();

// RENDER QR TO CANVAS

// ──────────────────────────────────────
// vCard variants
// Public mode omits Telegram. Advanced mode keeps the fuller note field.
// ──────────────────────────────────────
function buildVcard(includeTelegram) {
  const noteLines = [`WeChat ID: ${C.wechatId}`];
  if (includeTelegram) noteLines.push(`Telegram: ${C.telegramUrl}`);
  return [
    'BEGIN:VCARD',
    'VERSION:3.0',
    `N:${C.lastName};${C.firstName}`,
    `FN:${C.name}`,
    `ORG:${C.company}`,
    `TITLE:${C.title}`,
    `TEL;TYPE=CELL:${C.phone}`,
    `EMAIL:${C.email}`,
    `URL:${C.website}`,
    `ADR;TYPE=WORK:${C.addressVcard}`,
    `NOTE:${noteLines.join('\n')}`,
    'END:VCARD'
  ].join('\r\n');
}

const VCARD_FULL_ADVANCED = buildVcard(true);
const VCARD_FULL_PUBLIC = buildVcard(false);

// ──────────────────────────────────────
// QR TAB SWITCHING
// ──────────────────────────────────────
function switchQR(tab) {
  // In public mode, Telegram and vCard tabs are hidden — fall back to WhatsApp
  if (!isAdvancedMode() && ['telegram', 'vcard'].includes(tab)) tab = 'whatsapp';
  document.querySelectorAll('.qr-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.qr-panel').forEach(p => p.style.display = 'none');
  const panel = document.getElementById('panel-' + tab);
  if (panel) panel.style.display = 'flex';
}

// WHATSAPP — with optional name input
// ──────────────────────────────────────
let waTimer = null;

function openWhatsApp() {
  if (isTouchDevice) {
    // On mobile, show a quick modal to optionally enter name
    showWhatsAppModal();
  } else {
    showWhatsAppModal();
  }
}

function showWhatsAppModal() {
  const html = `
    <div class="modal-title">💬 WhatsApp chat</div>
    <div class="modal-text">Optional: add your name before opening chat.</div>
    <div class="wa-input-group">
      <input class="wa-input" id="waNameInput" type="text" placeholder="Your name (optional)" autocomplete="name">
    </div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-primary" onclick="launchWhatsApp()">
        Open WhatsApp
      </button>
      ${!isTouchDevice ? '<button class="modal-btn modal-btn-secondary" onclick="launchWhatsAppWeb()">WhatsApp Web</button>' : ''}
      <button class="modal-btn modal-btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  `;
  showModal(html);
  setTimeout(() => {
    const input = document.getElementById('waNameInput');
    if (input) input.focus();
  }, 100);
}

function buildWhatsAppMsg() {
  const nameInput = document.getElementById('waNameInput');
  const name = nameInput ? nameInput.value.trim() : '';
  if (name) {
    return encodeURIComponent(`Hello ${C.displayName}, this is ${name}. Please add me to your contacts.`);
  }
  return encodeURIComponent(getDefaultIntroText().replace(C.shortName, C.displayName));
}

function launchWhatsApp() {
  const msg = buildWhatsAppMsg();
  const url = `https://wa.me/${C.whatsapp}?text=${msg}`;
  closeModal();
  window.open(url, '_blank');

  // Fallback detection
  waTimer = setTimeout(() => {
    if (document.hasFocus()) {
      document.getElementById('waFallback').classList.add('show');
    }
  }, 2500);
  window.addEventListener('blur', cancelWAFallback, { once: true });
}

function launchWhatsAppWeb() {
  const msg = buildWhatsAppMsg();
  closeModal();
  window.open(`https://web.whatsapp.com/send?phone=${C.whatsapp}&text=${msg}`, '_blank');
}

function cancelWAFallback() { clearTimeout(waTimer); }

function dismissWAFallback() {
  document.getElementById('waFallback').classList.remove('show');
}

function launchWeChat() {
  const nameInput = document.getElementById('wcNameInput');
  const name = nameInput ? nameInput.value.trim() : '';
  let msg;
  if (name) {
    msg = `Hello ${C.shortName}, this is ${name}. Please add me to your contacts.`;
  } else {
    msg = getDefaultIntroText();
  }

  navigator.clipboard.writeText(msg).then(() => {
    // Show confirmation FIRST — user clicks to open WeChat when ready
    showModal(`
      <div class="modal-title" style="font-size:15px">🟢 Message Copied</div>
      <div style="background:var(--surface);border-radius:10px;padding:14px;margin:12px 0 16px;text-align:left">
        <div style="font-size:12px;color:var(--text-2);line-height:1.6">${msg}</div>
      </div>
      <div style="font-size:13px;color:var(--text-1);font-weight:500;margin-bottom:6px;text-align:center">
        Find ID: <strong>${C.wechatId}</strong>
      </div>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:16px;text-align:center">
        Add first if needed → <strong>Paste</strong> and send
      </div>
      <div class="modal-actions" style="gap:8px">
        <button class="modal-btn modal-btn-primary" onclick="openWeChatPreferred()">
          Open WeChat
        </button>
        <button class="modal-btn modal-btn-secondary" onclick="copyText(C.wechatId, 'WeChat ID')">
          Copy ID
        </button>
        <button class="modal-btn modal-btn-ghost" onclick="closeModal()">Done</button>
      </div>
    `);
  }).catch(() => {
    showModal(`
      <div class="modal-title" style="font-size:15px">🟢 WeChat</div>
      <div class="modal-text" style="margin-bottom:16px">
        Could not copy automatically. Open WeChat and search for ID: <strong>${C.wechatId}</strong>
      </div>
      <button class="done-btn" onclick="closeModal()">Done</button>
    `);
  });
}

function openTelegram() {
  const nameInput = document.getElementById('tgNameInput');
  const name = nameInput ? nameInput.value.trim() : '';
  let msg;
  if (name) {
    msg = `Hello ${C.shortName}, this is ${name}. Please add me to your contacts.`;
  } else {
    msg = getDefaultIntroText();
  }

  const encoded = encodeURIComponent(msg);
  const appUrl = 'tg://resolve?domain=' + encodeURIComponent(C.telegramHandle.replace(/^@/, '')) + '&text=' + encoded;
  const webUrl = C.telegramUrl + '?text=' + encoded;

  navigator.clipboard.writeText(msg).catch(() => {});
  closeModal();

  if (isTouchDevice) {
    window.location.href = appUrl;
    setTimeout(() => {
      window.open(webUrl, '_blank');
    }, 650);
  } else {
    window.open(webUrl, '_blank');
  }

  showToast('Telegram draft is prepared. If chat box is empty, paste the copied text.');
}

  if (isAndroid || isIOS || isTouchDevice) {

    window.location.href = appUrl;
    setTimeout(() => {

function downloadCurrentHtmlFile(fileName) {
  const file = buildShareCardFile(fileName);
  const url = URL.createObjectURL(file);
  const a = document.createElement('a');
  a.href = url;

}

function pad2(n) { return String(n).padStart(2, '0'); }

function getNextWorkingDayMeetingRange() {
  const start = new Date();
  start.setHours(10, 0, 0, 0);
  start.setDate(start.getDate() + 1);
  while (start.getDay() === 0 || start.getDay() === 6) {
    start.setDate(start.getDate() + 1);
  }
  const end = new Date(start.getTime() + 60 * 60 * 1000);
  return { start, end };
}

function formatIcsLocal(dt) {
  return dt.getFullYear() + pad2(dt.getMonth() + 1) + pad2(dt.getDate()) + 'T' + pad2(dt.getHours()) + pad2(dt.getMinutes()) + '00';
}

function formatMeetingDisplay(dt) {
  return dt.toLocaleString(undefined, {
    weekday: 'short', year: 'numeric', month: 'short', day: 'numeric',
    hour: 'numeric', minute: '2-digit'
  });
}

function buildMeetingInviteBody(start) {
  const display = formatMeetingDisplay(start);
  return `Hi ${C.shortName},

I would like to schedule a meeting with you.

I have proposed this slot for your consideration:
• ${display}
• Platform: To be confirmed / your preference

Please feel free to adjust the time, suggest another slot, or reply by email if another arrangement works better.

Thank you.
Best regards,`;
}

function formatCalendarCompact(dt) {
  return dt.getFullYear() + pad2(dt.getMonth() + 1) + pad2(dt.getDate()) + 'T' + pad2(dt.getHours()) + pad2(dt.getMinutes()) + '00';
}

function getGoogleCalendarDraftUrl() {
  const range = getNextWorkingDayMeetingRange();
  const tz = (() => { try { return Intl.DateTimeFormat().resolvedOptions().timeZone || ''; } catch (e) { return ''; } })();
  const title = 'Meeting with ' + C.name;
  const details = `Hi ${C.shortName},\n\nI would like to schedule a meeting with you. Please feel free to adjust the time if another slot works better.\n\nThank you.`;
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    + '&text=' + encodeURIComponent(title)
    + '&dates=' + encodeURIComponent(formatCalendarCompact(range.start) + '/' + formatCalendarCompact(range.end))
    + '&details=' + encodeURIComponent(details)
    + '&add=' + encodeURIComponent(C.email)
    + (tz ? '&ctz=' + encodeURIComponent(tz) : '');
}

  const range = getNextWorkingDayMeetingRange();

    'I would like to invite you to a meeting.',

    'Proposed slot:',
    whenText,
    '',
    'Please feel free to adjust the date/time if another slot works better.',
    '',
    'Thank you.'
  ].join('\n');
  return 'mailto:' + C.email + '?subject=' + encodeURIComponent(title) + '&body=' + encodeURIComponent(body);
}

function getInviteChannelState(key) {
  if (key === 'google') {
    if (!chinaProbeComplete) return { reachable: true, ready: false, label: 'Checking' };
    return isGoogleBlocked
      ? { reachable: false, ready: true, label: 'Unreachable' }
      : { reachable: true, ready: true, label: 'Reachable' };
  }

  if (!calendarProbeComplete[key]) return { reachable: true, ready: false, label: 'Checking' };
  return calendarReachable[key]
    ? { reachable: true, ready: true, label: 'Reachable' }
    : { reachable: false, ready: true, label: 'Unreachable' };
}

function getContactSaveCount() {
  try {
    const n = parseInt(localStorage.getItem(CONTACT_SAVE_COUNT_KEY) || '0', 10);
    return Number.isFinite(n) && n > 0 ? n : 0;
  } catch (e) {
    return 0;
  }
}

function shouldHidePublicSaveContact() {
  return getContactSaveCount() >= CONTACT_SAVE_HIDE_AFTER;
}

function markContactSavedHere() {
  try {
    const nextCount = getContactSaveCount() + 1;
    localStorage.setItem(CONTACT_SAVE_COUNT_KEY, String(nextCount));
    if (nextCount >= CONTACT_SAVE_HIDE_AFTER) {
      localStorage.setItem(CONTACT_SAVED_KEY, '1');
    }
  } catch (e) {}
  applyPublicCtaState();
  refreshOwnerEventList();
}

function applyPublicCtaState() {
  const stack = document.querySelector('.simple-cta-stack');
  if (stack) {
    const saved = shouldHidePublicSaveContact();
    stack.classList.toggle('contact-saved', saved);
  }
  // Advanced mode should always keep Save Contact visible,
  // regardless of the browser-local saved flag used by public mode.
  const advSaveBtn = document.getElementById('advSaveBtn');
  if (advSaveBtn) advSaveBtn.style.display = '';
}

function escapeHtml(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

async function getUserCalendarOwnerEvents() {
  if (!OWNER_EVENT_PROVIDERS.userCalendar.enabled) return [];
  return [];
}

async function getOwnerCalendarPendingEvents() {
  if (!OWNER_EVENT_PROVIDERS.ownerCalendar.enabled) return [];
  return [];
}

async function getLocalOwnerEventDrafts() {
  if (!OWNER_EVENT_PROVIDERS.localDrafts.enabled) return [];
  return [];
}

async function getOwnerRelatedEvents() {
  switch (OWNER_EVENT_SOURCE) {
    case 'user-calendar':
      return getUserCalendarOwnerEvents();
    case 'owner-calendar':
      return getOwnerCalendarPendingEvents();
    case 'local-drafts':
      return getLocalOwnerEventDrafts();
    case 'future-ready':
    default:
      return [];
  }
}

function withTimeout(promise, ms) {
  return Promise.race([
    Promise.resolve(promise),
    new Promise(resolve => setTimeout(() => resolve([]), ms))
  ]);
}

async function refreshOwnerEventList() {
  if (!FEATURE_OWNER_EVENT_LIST) {
    renderOwnerEventList([]);
    return;
  }
  try {
    const events = await withTimeout(getOwnerRelatedEvents(), OWNER_EVENT_PROVIDER_TIMEOUT_MS);
    renderOwnerEventList(Array.isArray(events) ? events : []);
  } catch (e) {
    renderOwnerEventList([]);
  }
}

function renderOwnerEventList(events) {
  const host = document.getElementById('ownerEventList');
  if (!host) return;
  if (!Array.isArray(events) || !events.length) {
    host.style.display = 'none';
    host.innerHTML = '';
    return;
  }
  const items = events.map(ev => `
    <div style="padding:9px 10px;border-radius:12px;background:var(--surface);border:1px solid var(--border);text-align:left">
      <div style="font-size:12px;font-weight:700;color:var(--text-1)">${escapeHtml(ev.title || 'Meeting')}</div>
      <div style="font-size:11px;color:var(--text-3);margin-top:2px">${escapeHtml(ev.when || '')}</div>
      ${(ev.where ? `<div style="font-size:11px;color:var(--text-3);margin-top:2px">${escapeHtml(ev.where)}</div>` : '')}
    </div>
  `).join('');
  host.innerHTML = `
    <div style="display:grid;gap:6px">
      <div style="font-size:12px;font-weight:700;color:var(--text-2);text-align:left;padding:0 2px">${getOwnerEventsLabel()}</div>
      ${items}
    </div>
  `;
  host.style.display = '';
}

function saveContact() {
  refreshVcardModeResources();
  triggerVcfDownload();
  markContactSavedHere();

  // All platforms get a post-download modal with platform-appropriate guidance
  if (isIOS) {
    // iOS/iPad: system handles .vcf natively, short delay then show modal
    setTimeout(() => showIOSSaveModal(), 300);
  } else if (isAndroid) {
    // Android: download notification, longer delay
    setTimeout(() => showAndroidSaveModal(), 2800);
  } else {
    // Desktop (Windows, macOS, Linux): show chooser
    setTimeout(() => showDesktopSaveModal(), 600);
  }
}

function triggerVcfDownload() {
  const a = document.createElement('a');
  a.href = vcfDataUri;
  a.download = vcfDownloadFilename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// Environment tag for troubleshooting
function getEnvTag() {
  const isWindows = /Windows/i.test(UA);
  const isMac = /Macintosh|Mac OS/i.test(UA);
  const isLinux = /Linux/i.test(UA) && !isAndroid;
  const isEdge = /Edg\//i.test(UA);
  const isChrome = /Chrome/i.test(UA) && !isEdge;
  const isFirefox = /Firefox/i.test(UA);
  const isSafari = /Safari/i.test(UA) && !isChrome && !isEdge;

  let os = isWindows ? 'Windows' : isMac ? 'macOS' : isLinux ? 'Linux' : isIOS ? 'iOS' : isAndroid ? 'Android' : 'Unknown';
  let browser = isEdge ? 'Edge' : isChrome ? 'Chrome' : isFirefox ? 'Firefox' : isSafari ? 'Safari' : '';
  let lang = (navigator.language || '').substring(0, 5);
  return `${os}${browser ? ' · ' + browser : ''} · ${lang}`;
}

let wechatLaunchBusy = false;

function openWeChat() {
  if (wechatLaunchBusy) return;
  wechatLaunchBusy = true;

  let leftPage = false;
  const markHidden = () => {
    if (document.hidden) leftPage = true;
  };
  document.addEventListener('visibilitychange', markHidden, { passive: true });

  const clearLaunchState = () => {
    document.removeEventListener('visibilitychange', markHidden, { passive: true });
    wechatLaunchBusy = false;
  };

  const tryScheme = (url, useIframe = false) => {
    try {
      if (useIframe) {
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.setAttribute('aria-hidden', 'true');
        iframe.src = url;
        document.body.appendChild(iframe);
        setTimeout(() => iframe.remove(), 700);
      } else {
        window.location.href = url;
      }
    } catch (e) {}
  };

  // One gentle app-open attempt only. Do not chain retries, to avoid Android in-app browser error pages.
  if (isAndroid) {
    tryScheme('weixin://', true);
  } else {
    tryScheme('weixin://');
  }

  // Do not auto-show a fallback modal after the app-open attempt.
  // If WeChat opened and the user returns, an automatic 'did not open' message is confusing.
  // Just release the launch lock quietly.
  setTimeout(() => {
    clearLaunchState();
  }, 1200);
}

function getShareCardFileName() {
  return getOwnerCardFilename();
}

function getShareCardTitle() {
  return C.name + ' — Digital Name Card';
}

function getShareCardAttachNote() {
  return 'Sharing ' + C.name + '\'s vNamecard HTML file.';
}

function buildShareCardFile(fileName) {
  const docEl = document.documentElement.cloneNode(true);

  // Remove transient runtime UI state before exporting.
  docEl.querySelectorAll('.modal-overlay.show').forEach(el => el.classList.remove('show'));
  docEl.querySelectorAll('.wa-fallback-banner.show').forEach(el => el.classList.remove('show'));
  docEl.querySelectorAll('.toast.show').forEach(el => el.classList.remove('show'));

  const modalBody = docEl.querySelector('#modalBody');
  if (modalBody) modalBody.innerHTML = '';

  // Export a clean default/public view instead of the current temporary DOM state.
  const card = docEl.querySelector('.card');
  if (card) card.classList.remove('mode-adv');

  // Avoid file-size inflation from runtime-generated QR data URLs.
  ['qr-whatsapp-img','qr-wechat-img','qr-telegram-img','qr-vcard-img'].forEach(id => {
    const img = docEl.querySelector('#' + id);
    if (img) img.removeAttribute('src');
  });

  // Remove copied tips / temporary text if visible.
  const tip = docEl.querySelector('#detailsCopyTip');
  if (tip) tip.style.opacity = '0';

  const html = '<!DOCTYPE html>' + docEl.outerHTML;
  return new File([html], fileName, { type: 'text/html' });
}

async function tryNativeHtmlFileShare(fileName, shareTitle, shareText) {
  if (!navigator.share || !navigator.canShare) return { status: 'unsupported' };
  try {
    const file = buildShareCardFile(fileName);
    const shareData = { title: shareTitle, text: shareText, files: [file] };
    if (navigator.canShare(shareData)) {
      await navigator.share(shareData);
      return { status: 'shared' };
    }
    return { status: 'unsupported' };
  } catch (e) {
    const name = (e && e.name) ? e.name : '';
    if (name === 'AbortError') return { status: 'aborted' };
    return { status: 'failed', error: e };
  }
}

function getShareCardEmailMailtoUrl() {
  const subject = encodeURIComponent(C.name + ' vNamecard HTML file');
  const body = encodeURIComponent('Hi,\n\nSharing ' + C.name + '\'s vNamecard HTML file.\nYou may attach the auto-downloaded file if needed.\n\nThank you.');
  return 'mailto:?subject=' + subject + '&body=' + body;

async function shareCardToWhatsApp() {
  closeModal();
  const fileName = getShareCardFileName();
  const shareTitle = getShareCardTitle();
  const attachNote = getShareCardAttachNote();
  navigator.clipboard.writeText(attachNote).catch(() => {});
  showToast('Choose WhatsApp in the share window. If message is empty, paste the copied note.');

  const result = await tryNativeHtmlFileShare(fileName, shareTitle, attachNote);
  if (result.status === 'shared' || result.status === 'aborted') return;

  downloadCurrentHtmlFile(fileName);
  const msg = encodeURIComponent(attachNote);
  const url = isTouchDevice ? ('whatsapp://send?text=' + msg) : ('https://wa.me/?text=' + msg);
  if (isTouchDevice) {
    window.location.href = url;
  } else {
    window.open(url, '_blank');
  }
  showToast('HTML downloaded. In WhatsApp, attach the file and paste the copied note.');
}

function shareCardToEmail() {
  closeModal();
  const fileName = getShareCardFileName();
  const attachNote = getShareCardAttachNote();
  downloadCurrentHtmlFile(fileName);
  navigator.clipboard.writeText(attachNote).catch(() => {});
  showToast('HTML downloaded. Review the help card, then open the email draft.');
  showHtmlAttachHelpModal('Email', {
    openBtnHtml: '<button class="modal-btn modal-btn-primary" onclick="window.location.href=getShareCardEmailMailtoUrl();closeModal()">↗ Open Email Draft</button>'
  });
}

function shareCardToWeChat() {
  closeModal();
  const fileName = getShareCardFileName();
  const attachNote = getShareCardAttachNote();
  downloadCurrentHtmlFile(fileName);
  navigator.clipboard.writeText(attachNote).catch(() => {});
  showHtmlAttachHelpModal('WeChat', {
    openBtnHtml: '<button class="modal-btn modal-btn-primary" onclick="openWeChatPreferred()">↗ Open WeChat</button>'
  });
}

function downloadShareCardOnly() {

  showHtmlAttachHelpModal('Email', { showNote: false });
}

function toggleDetails() {
  const body = document.getElementById('detailsBody');
  const arrow = document.getElementById('detailsArrow');
  if (body.style.display === 'none') {
    body.style.display = 'block';
    arrow.style.transform = 'rotate(90deg)';
  } else {
    body.style.display = 'none';
    arrow.style.transform = 'rotate(0deg)';
  }
}

function copyAllDetails() {
  const lines = [
    C.name,
    `${C.title}, ${C.company}`,
    '',
    `Mobile/WhatsApp: ${C.phone}`,
    `Email: ${C.email}`,
    `WeChat ID: ${C.wechatId}`,
    `Telegram: ${C.telegramHandle} (${C.telegramUrl})`,
    `Website: ${C.website}`,
    `Address: ${C.addressPlain}`,
  ];

  const allText = lines.join('\n');
  navigator.clipboard.writeText(allText)
    .then(() => {
      const tip = document.getElementById('detailsCopyTip');
      if (tip) {
        tip.style.opacity = '1';
        setTimeout(() => { tip.style.opacity = '0'; }, 1800);
      }
    })
    .catch(() => showToast('Could not copy'));
}

function showToast(msg) {
  const touchLike =
    isTouchDevice ||
    hasCoarsePointer ||
    isAndroid ||
    isIOS ||
    ('ontouchstart' in window) ||
    ((navigator.maxTouchPoints || 0) > 0) ||
    /Android|iPhone|iPad|iPod|Mobile|HarmonyOS/i.test(navigator.userAgent || '') ||
    (window.matchMedia && window.matchMedia('(hover:none), (pointer:coarse)').matches) ||
    location.protocol === 'content:';
  if (touchLike) return;
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════════════════════════════════
// DUAL MODE — Simple (public default) ↔ Advanced (full view)
//
// HOW TO TOGGLE:
//   Mobile  : triple-tap the hidden top-right hotspot (3 taps within 700 ms)
//   Desktop : triple-click the hidden top-right hotspot  — OR —  Alt + Shift + V
//   Also    : tap the v18.2 badge in the footer (secondary)
//
// EXIT ADVANCED: tap "Back to simple view" bar at bottom of card.
// ══════════════════════════════════════════════════════════════════════

function toggleCardMode() {
  const card  = document.querySelector('.card');
  const badge = document.getElementById('modeBadge');
  const isAdv = card.classList.contains('mode-adv');

  if (isAdv) {
    // → Simple mode
    card.classList.remove('mode-adv');
    if (badge) badge.textContent = CARD_VERSION;
    sessionStorage.setItem(CARD_MODE_STORAGE_KEY, 'simple');
    refreshVcardModeResources();
    // If a public-hidden QR tab is active, reset to WhatsApp
    const activeTab = document.querySelector('.qr-tab.active');
    if (activeTab && ['telegram', 'vcard'].includes(activeTab.dataset.tab)) {
      switchQR('whatsapp');
    }
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    // → Advanced mode
    card.classList.add('mode-adv');
    if (badge) badge.textContent = CARD_VERSION + ' ↑';
    sessionStorage.setItem(CARD_MODE_STORAGE_KEY, 'advanced');
    refreshVcardModeResources();
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// Restore saved mode on load
(function initCardMode() {
  function applyMode() {
    const touchLike =
      isTouchDevice ||
      hasCoarsePointer ||
      isAndroid ||
      isIOS ||
      ('ontouchstart' in window) ||
      ((navigator.maxTouchPoints || 0) > 0) ||
      (window.matchMedia && window.matchMedia('(hover:none), (pointer:coarse)').matches) ||
      location.protocol === 'content:';
    const savedMode = sessionStorage.getItem(CARD_MODE_STORAGE_KEY);
    const card  = document.querySelector('.card');
    const badge = document.getElementById('modeBadge');

    if (touchLike) {
      if (card) card.classList.remove('mode-adv');
      if (badge) badge.textContent = CARD_VERSION;
      sessionStorage.setItem(CARD_MODE_STORAGE_KEY, 'simple');
    } else if (savedMode === 'advanced') {
      if (card)  card.classList.add('mode-adv');
      if (badge) badge.textContent = CARD_VERSION + ' ↑';
    } else {
      if (card) card.classList.remove('mode-adv');
      if (badge) badge.textContent = CARD_VERSION;
    }
    refreshVcardModeResources();
    applyPublicCtaState();
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyMode, { once: true });
  } else {
    applyMode();
  }
})();

refreshVcardModeResources();

// ── Hidden entry gesture: triple-click/tap the hidden top-right hotspot ──────────────
(function initAvatarGesture() {
  var taps = 0, timer = null;

  function onTap() {
    taps++;
    clearTimeout(timer);
    if (taps >= 3) {
      taps = 0;
      toggleCardMode();
    } else {
      timer = setTimeout(function() { taps = 0; }, 700);
    }
  }

  function onKey(e) {
    if (e.altKey && e.shiftKey && (e.key === 'V' || e.key === 'v')) {
      e.preventDefault();
      toggleCardMode();
    }
  }

  function attach() {
    var av = document.getElementById('avatarToggle');
    if (av) av.addEventListener('click', onTap);
    document.addEventListener('keydown', onKey);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', attach, { once: true });
  } else {
    attach();
  }
})();
</script>
